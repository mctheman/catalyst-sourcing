name: Research Radar Scrape

on:
  schedule:
    - cron: '0 6 * * 1'   # Every Monday 6am UTC
  workflow_dispatch:
    inputs:
      extra_org:
        description: 'GitHub org login to add to this run (e.g. "huggingface")'
        required: false
        default: ''

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests python-dotenv

      - name: Run scraper
        run: python main.py
        env:
          GITHUB_TOKEN: ${{ secrets.SCRAPE_TOKEN }}
          EXTRA_ORG: ${{ inputs.extra_org }}

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add weekly_digest.csv results.csv runs/
          git diff --cached --quiet || git commit -m "chore: scrape $(date -u +%Y-%m-%d)"
          git push
