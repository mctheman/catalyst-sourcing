name: Research Radar Scrape

on:
  schedule:
    - cron: '0 6 * * 1'   # Every Monday 6am UTC
  workflow_dispatch:
    inputs:
      extra_org:
        description: 'GitHub org login to add to this run (e.g. "huggingface")'
        required: false
        default: ''

concurrency:
  group: research-radar-scrape-main
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests python-dotenv

      - name: Run scraper
        run: python main.py
        env:
          GITHUB_TOKEN: ${{ secrets.SCRAPE_TOKEN }}
          EXTRA_ORG: ${{ inputs.extra_org }}

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add weekly_digest.csv results.csv runs/

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "chore: scrape $(date -u +%Y-%m-%d)"

          for i in 1 2 3; do
            git pull --rebase origin main && git push origin HEAD:main && exit 0
            echo "Push failed. Retrying..."
            sleep 5
          done

          echo "Push failed after 3 attempts."
          exit 1
